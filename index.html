<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我想静静</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
        body { font-family: 'Courier New', monospace; overflow: hidden; background: #0a0a0a; }
        
        /* 首页 - 像素风格 */
        .home {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0a0a0a; z-index: 100; transition: opacity 0.6s ease;
        }
        .home.fade-out { opacity: 0; pointer-events: none; }
        
        .home::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(30, 58, 95, 0.03) 4px, rgba(30, 58, 95, 0.03) 8px),
                repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(30, 58, 95, 0.03) 4px, rgba(30, 58, 95, 0.03) 8px);
            pointer-events: none;
        }
        
        .pixel-title {
            font-size: 12px; color: #4a5568; margin-bottom: 60px;
            letter-spacing: 4px; text-transform: uppercase;
            text-shadow: 2px 2px 0 rgba(30, 58, 95, 0.3);
        }
        
        .pixel-btn {
            position: relative; padding: 20px 40px; background: #1e3a8a;
            border: 4px solid #3b82f6; color: #fff; font-size: 16px;
            letter-spacing: 4px; cursor: pointer;
            box-shadow: 4px 4px 0 #0f172a, inset -4px -4px 0 rgba(0,0,0,0.2), inset 4px 4px 0 rgba(255,255,255,0.1);
            animation: pixel-breathe 3s steps(2) infinite; transition: transform 0.1s;
        }
        
        @keyframes pixel-breathe {
            0%, 100% { box-shadow: 4px 4px 0 #0f172a, 0 0 20px rgba(59, 130, 246, 0.3), inset -4px -4px 0 rgba(0,0,0,0.2), inset 4px 4px 0 rgba(255,255,255,0.1); }
            50% { box-shadow: 4px 4px 0 #0f172a, 0 0 40px rgba(59, 130, 246, 0.5), inset -4px -4px 0 rgba(0,0,0,0.2), inset 4px 4px 0 rgba(255,255,255,0.1); }
        }
        
        .pixel-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #0f172a, inset -4px -4px 0 rgba(0,0,0,0.2), inset 4px 4px 0 rgba(255,255,255,0.1); }
        
        .pixel-decoration { position: absolute; width: 8px; height: 8px; background: #3b82f6; opacity: 0.3; }
        .pixel-decoration:nth-child(1) { top: 20%; left: 15%; animation: twinkle 2s steps(2) infinite; }
        .pixel-decoration:nth-child(2) { top: 30%; right: 20%; animation: twinkle 3s steps(2) infinite 0.5s; }
        .pixel-decoration:nth-child(3) { bottom: 25%; left: 25%; animation: twinkle 2.5s steps(2) infinite 1s; }
        .pixel-decoration:nth-child(4) { bottom: 35%; right: 15%; animation: twinkle 2s steps(2) infinite 1.5s; }
        
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.6; } }
        
        .home-hint { position: absolute; bottom: 80px; font-size: 10px; color: #374151; letter-spacing: 2px; }
        
        /* 地图页 */
        .map-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transform: scale(0.9); transition: opacity 0.5s ease, transform 0.5s ease; background: #0a0a0a; overflow: hidden; }
        .map-page.active { opacity: 1; transform: scale(1); }
        
        .pixel-map { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(20, 1fr); gap: 1px; width: 100%; max-width: 400px; aspect-ratio: 4/5; padding: 10px; }
        .pixel-cell { aspect-ratio: 1; }
        
        .cell-quiet-5 { background: #1e3a8a; }
        .cell-quiet-4 { background: #3b82f6; }
        .cell-quiet-3 { background: #059669; }
        .cell-quiet-2 { background: #d97706; }
        .cell-quiet-1 { background: #dc2626; }
        .cell-empty { background: #1a1a2e; }
        
        .user-pixel { position: absolute; width: 16px; height: 16px; background: #fff; border: 2px solid #3b82f6; z-index: 20; animation: pixel-pulse 1s steps(2) infinite; }
        @keyframes pixel-pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.2); } }
        
        .place-marker { position: absolute; transform: translate(-50%, -50%); z-index: 15; cursor: pointer; }
        .place-marker .dot { width: 12px; height: 12px; }
        .place-marker .label { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 9px; color: #fff; background: rgba(0,0,0,0.8); padding: 2px 6px; }
        
        .back-btn { position: absolute; top: 50px; left: 20px; z-index: 30; padding: 8px 16px; background: #1e3a8a; border: 3px solid #3b82f6; color: #fff; font-size: 12px; cursor: pointer; box-shadow: 3px 3px 0 #0f172a; }
        .back-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #0f172a; }
        
        .legend { position: absolute; bottom: 20px; left: 20px; right: 20px; z-index: 30; background: rgba(10,10,10,0.95); border: 3px solid #1e3a8a; padding: 12px; }
        .legend-title { font-size: 10px; color: #6b7280; margin-bottom: 8px; letter-spacing: 2px; }
        .legend-items { display: flex; justify-content: space-between; }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 9px; color: #9ca3af; }
        .legend-dot { width: 8px; height: 8px; }
        
        .place-card { position: absolute; bottom: 100px; left: 20px; right: 20px; background: rgba(10,10,10,0.98); border: 3px solid #3b82f6; padding: 16px; z-index: 25; display: none; box-shadow: 4px 4px 0 #0f172a; }
        .place-card.show { display: block; animation: slide-up 0.2s steps(3); }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .place-name { font-size: 14px; color: #fff; margin-bottom: 8px; letter-spacing: 1px; }
        .place-info { display: flex; gap: 16px; font-size: 11px; color: #9ca3af; margin-bottom: 12px; }
        .btn-navigate { width: 100%; padding: 12px; background: #1e3a8a; border: 2px solid #3b82f6; color: #fff; font-size: 12px; cursor: pointer; letter-spacing: 2px; }
        .btn-navigate:active { background: #1e40af; }
        
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #4a5568; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="home" id="home">
        <div class="pixel-decoration"></div>
        <div class="pixel-decoration"></div>
        <div class="pixel-decoration"></div>
        <div class="pixel-decoration"></div>
        <div class="pixel-title">找人少、安静、可独处的地方</div>
        <button class="pixel-btn" onclick="enterMap()">我想静静</button>
        <div class="home-hint">只推荐步行10分钟内可达的角落</div>
    </div>

    <div class="map-page" id="mapPage">
        <button class="back-btn" onclick="backHome()">← 返回</button>
        <div class="loading" id="loading">正在寻找安静的角落...</div>
        <div class="pixel-map" id="pixelMap"></div>
        <div class="legend">
            <div class="legend-title">安静指数</div>
            <div class="legend-items">
                <div class="legend-item"><div class="legend-dot" style="background:#1e3a8a"></div><span>极少</span></div>
                <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div><span>安静</span></div>
                <div class="legend-item"><div class="legend-dot" style="background:#059669"></div><span>中等</span></div>
                <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div><span>热闹</span></div>
            </div>
        </div>
        <div class="place-card" id="placeCard">
            <div class="place-name" id="placeName"></div>
            <div class="place-info">
                <span id="walkTime"></span>
                <span id="distance"></span>
            </div>
            <button class="btn-navigate" id="navBtn">步行前往 →</button>
        </div>
    </div>

    <script>
        const places = [
            { name: "越秀公园东北角", lat: 23.1408, lng: 113.2644, quiet: 4 },
            { name: "天河公园西门小湖", lat: 23.1286, lng: 113.3617, quiet: 4 },
            { name: "海珠湖公园西侧栈道", lat: 23.0703, lng: 113.3144, quiet: 5 },
            { name: "珠江公园东区", lat: 23.1250, lng: 113.3333, quiet: 4 },
            { name: "东山口新河浦老别墅区", lat: 23.1208, lng: 113.3000, quiet: 5 },
            { name: "华侨新村老别墅区", lat: 23.1333, lng: 113.2833, quiet: 5 },
            { name: "广州图书馆8-9楼", lat: 23.1208, lng: 113.3250, quiet: 5 },
            { name: "红专厂旧址", lat: 23.1167, lng: 113.3667, quiet: 5 },
        ];

        let userLocation = null;
        let nearbyPlaces = [];

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getWalkTime(distance) {
            return Math.round(distance / 5 * 60);
        }

        function enterMap() {
            document.getElementById('home').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('mapPage').classList.add('active');
                initMap();
            }, 300);
        }

        function backHome() {
            document.getElementById('mapPage').classList.remove('active');
            document.getElementById('home').classList.remove('fade-out');
            document.getElementById('placeCard').classList.remove('show');
        }

        function initMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        renderMap();
                    },
                    err => {
                        userLocation = { lat: 23.1291, lng: 113.2644 };
                        renderMap();
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                userLocation = { lat: 23.1291, lng: 113.2644 };
                renderMap();
            }
        }

        function renderMap() {
            document.getElementById('loading').style.display = 'none';
            const grid = document.getElementById('pixelMap');
            
            nearbyPlaces = places.map(p => {
                const dist = getDistance(userLocation.lat, userLocation.lng, p.lat, p.lng);
                const walkTime = getWalkTime(dist);
                return { ...p, dist, walkTime };
            }).filter(p => p.walkTime <= 10).sort((a, b) => a.walkTime - b.walkTime);
            
            grid.innerHTML = '';
            
            // 16x20 = 320个像素格子
            for (let i = 0; i < 320; i++) {
                const cell = document.createElement('div');
                cell.className = 'pixel-cell';
                
                const row = Math.floor(i / 16);
                const col = i % 16;
                
                // 计算这个格子与各个地点的距离
                let minDist = Infinity;
                let nearestQuiet = 1;
                
                nearbyPlaces.forEach(p => {
                    const pRow = 10 + Math.floor((p.lat - userLocation.lat) * 200);
                    const pCol = 8 + Math.floor((p.lng - userLocation.lng) * 200);
                    const d = Math.abs(row - pRow) + Math.abs(col - pCol);
                    if (d < minDist) {
                        minDist = d;
                        nearestQuiet = p.quiet;
                    }
                });
                
                // 根据距离衰减
                let quietLevel = nearestQuiet;
                if (minDist > 2) quietLevel = Math.max(1, quietLevel - 1);
                if (minDist > 5) quietLevel = Math.max(1, quietLevel - 1);
                
                // 中心区域（用户位置）周围是空的
                const centerRow = 10;
                const centerCol = 8;
                const distToCenter = Math.abs(row - centerRow) + Math.abs(col - centerCol);
                
                if (distToCenter <= 1) {
                    cell.classList.add('cell-empty');
                } else if (nearbyPlaces.length === 0 || minDist > 8) {
                    cell.classList.add('cell-empty');
                } else {
                    cell.classList.add(`cell-quiet-${quietLevel}`);
                }
                
                grid.appendChild(cell);
            }
            
            // 用户位置标记（中心）
            const userMarker = document.createElement('div');
            userMarker.className = 'user-pixel';
            userMarker.style.left = '50%';
            userMarker.style.top = '50%';
            grid.appendChild(userMarker);
            
            // 地点标记
            nearbyPlaces.forEach(p => {
                const marker = document.createElement('div');
                marker.className = 'place-marker';
                const offsetY = (userLocation.lat - p.lat) * 4000;
                const offsetX = (p.lng - userLocation.lng) * 4000;
                marker.style.left = `calc(50% + ${offsetX}px)`;
                marker.style.top = `calc(50% + ${offsetY}px)`;
                
                const colors = { 5: '#1e3a8a', 4: '#3b82f6', 3: '#059669', 2: '#d97706', 1: '#dc2626' };
                marker.innerHTML = `
                    <div class="dot" style="background:${colors[p.quiet]}"></div>
                    <div class="label">${p.walkTime}分</div>
                `;
                marker.onclick = () => showPlace(p);
                grid.appendChild(marker);
            });
        }

        function showPlace(p) {
            document.getElementById('placeName').textContent = p.name;
            document.getElementById('walkTime').textContent = `步行 ${p.walkTime}分钟`;
            document.getElementById('distance').textContent = `${p.dist.toFixed(1)}km`;
            document.getElementById('placeCard').classList.add('show');
            
            document.getElementById('navBtn').onclick = () => {
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                const name = encodeURIComponent(p.name);
                if (isIOS) {
                    window.location.href = `iosamap://path?dlat=${p.lat}&dlon=${p.lng}&dname=${name}&dev=0&t=2`;
                } else {
                    window.location.href = `amapuri://route/plan/?dlat=${p.lat}&dlon=${p.lng}&dname=${name}&dev=0&t=2`;
                }
                setTimeout(() => {
                    window.location.href = `https://uri.amap.com/navigation?to=${p.lng},${p.lat},${name}&mode=walk&coordinate=gaode`;
                }, 500);
            };
        }
    </script>
</body>
</html>
