<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我想静静</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; overflow: hidden; background: #000; }
        
        /* 首页 - 艺术画廊 */
        .home {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; transition: opacity 0.8s ease;
        }
        .home.fade-out { opacity: 0; pointer-events: none; }
        
        /* 背景画廊 */
        .gallery-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: opacity 1s ease;
        }
        .gallery-bg.fade { opacity: 0; }
        
        /* 暗色遮罩 */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.8) 100%);
        }
        
        /* 内容层 */
        .content {
            position: relative; z-index: 10;
            height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        
        /* 画作信息 */
        .artwork-info {
            position: absolute; bottom: 140px; left: 0; right: 0;
            text-align: center; padding: 0 20px;
            opacity: 0.7;
        }
        .artwork-title {
            font-size: 11px; color: rgba(255,255,255,0.6);
            letter-spacing: 2px; margin-bottom: 4px;
        }
        .artwork-artist {
            font-size: 10px; color: rgba(255,255,255,0.4);
        }
        
        /* 主按钮 */
        .btn-quiet {
            padding: 20px 50px; background: transparent;
            border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.9);
            font-size: 18px; letter-spacing: 8px;
            cursor: pointer; transition: all 0.4s ease;
            backdrop-filter: blur(4px);
        }
        .btn-quiet:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.5);
        }
        
        /* 指示器 */
        .indicators {
            position: absolute; bottom: 60px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 8px;
        }
        .indicator {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .indicator.active {
            background: rgba(255,255,255,0.8);
            transform: scale(1.2);
        }
        
        /* 地图页 */
        .map-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transform: scale(0.95); transition: opacity 0.6s ease, transform 0.6s ease; background: #0a0a0a; overflow: hidden; }
        .map-page.active { opacity: 1; transform: scale(1); }
        
        /* Game Boy 风格地图 */
        .gb-map-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0f380f;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 
                0 0 0 4px #306230,
                0 0 0 8px #0f380f,
                0 10px 30px rgba(0,0,0,0.5);
        }
        
        .pixel-map { 
            display: grid; 
            grid-template-columns: repeat(20, 1fr); 
            gap: 0; 
            width: 320px; 
            height: 320px;
            background: #0f380f;
            image-rendering: pixelated;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        
        .pixel-cell { 
            width: 16px; 
            height: 16px; 
            image-rendering: pixelated;
        }
        
        /* Game Boy 风格调色板 - 深色版 */
        .cell-quiet-5 { background: #8bac0f; } /* 最浅绿 - 人最少 */
        .cell-quiet-4 { background: #306230; } /* 中绿 - 安静 */
        .cell-quiet-3 { background: #0f380f; } /* 深绿 - 中等 */
        .cell-quiet-2 { background: #1a1a2e; } /* 暗色 - 热闹 */
        .cell-quiet-1 { background: #000000; } /* 黑色 - 避开 */
        .cell-empty { background: #0f380f; }    /* 背景绿 */
        
        /* 像素边框效果 */
        .pixel-cell::after {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(0,0,0,0.1);
        }
        
        .user-marker { position: absolute; width: 14px; height: 14px; background: #fff; border: 2px solid #3b82f6; border-radius: 50%; z-index: 20; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } }
        
        .back-btn { position: absolute; top: 50px; left: 20px; z-index: 30; padding: 10px 20px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 12px; cursor: pointer; }
        
        .legend { position: absolute; bottom: 30px; left: 20px; right: 20px; z-index: 30; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 16px; }
        .legend-title { font-size: 11px; color: #6b7280; margin-bottom: 10px; letter-spacing: 1px; }
        .legend-items { display: flex; justify-content: space-between; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #9ca3af; }
        .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
        
        .place-card { position: absolute; bottom: 120px; left: 20px; right: 20px; background: rgba(0,0,0,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; z-index: 25; display: none; }
        .place-card.show { display: block; animation: slide-up 0.3s ease; }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .place-name { font-size: 16px; color: #fff; margin-bottom: 8px; }
        .place-info { display: flex; gap: 20px; font-size: 12px; color: #9ca3af; margin-bottom: 16px; }
        .btn-navigate { width: 100%; padding: 14px; background: #1e3a8a; border: none; border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <!-- 首页 - 艺术画廊 -->
    <div class="home" id="home">
        <div class="gallery-bg" id="galleryBg"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <button class="btn-quiet" onclick="enterMap()">我想静静</button>
            
            <div class="artwork-info" id="artworkInfo">
                <div class="artwork-title" id="artworkTitle"></div>
                <div class="artwork-artist" id="artworkArtist"></div>
            </div>
            
            <div class="indicators" id="indicators"></div>
        </div>
    </div>

    <!-- 地图页 -->
    <div class="map-page" id="mapPage">
        <button class="back-btn" onclick="backHome()">← 返回</button>
        <div class="gb-map-container">
            <div class="pixel-map" id="pixelMap"></div>
        </div>
        <div class="user-marker" id="userMarker" style="display:none; left:50%; top:50%;"></div>
        
        <div class="legend">
            <div class="legend-title">安静指数</div>
            <div class="legend-items">
                <div class="legend-item"><div class="legend-dot" style="background:#1e3a8a"></div><span>极少</span></div>
                <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div><span>安静</span></div>
                <div class="legend-item"><div class="legend-dot" style="background:#059669"></div><span>中等</span></div>
                <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div><span>热闹</span></div>
            </div>
        </div>
        
        <div class="place-card" id="placeCard">
            <div class="place-name" id="placeName"></div>
            <div class="place-info">
                <span id="walkTime"></span>
                <span id="distance"></span>
            </div>
            <button class="btn-navigate" id="navBtn">步行前往</button>
        </div>
    </div>

    <script>
        // 艺术作品数据 - 无人物，纯场景
        const artworks = [
            { title: "深夜的窗", artist: "Edward Hopper 风格", url: "https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=800&q=80" },
            { title: "空房间", artist: "Vilhelm Hammershøi 风格", url: "https://images.unsplash.com/photo-1513694203232-719a280e022f?w=800&q=80" },
            { title: "雾中公园", artist: "静谧时刻", url: "https://images.unsplash.com/photo-1483729558449-99ef09a8c325?w=800&q=80" },
            { title: "深夜街道", artist: "城市孤独", url: "https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=800&q=80" },
            { title: "晨光海边", artist: "独处时光", url: "https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=800&q=80" },
            { title: "雨夜窗景", artist: "静谧时刻", url: "https://images.unsplash.com/photo-1515169067868-5387ec356754?w=800&q=80" },
            { title: "空旷楼梯", artist: "空间与孤独", url: "https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&q=80" },
            { title: "黄昏岸边", artist: "独处时光", url: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80" },
        ];

        let currentArtwork = 0;
        let galleryInterval;

        // 初始化画廊
        function initGallery() {
            const bg = document.getElementById('galleryBg');
            const indicators = document.getElementById('indicators');
            
            // 创建指示器
            artworks.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'indicator' + (i === 0 ? ' active' : '');
                indicators.appendChild(dot);
            });
            
            // 设置第一张图
            bg.style.backgroundImage = `url(${artworks[0].url})`;
            updateArtworkInfo(0);
            
            // 开始轮播
            galleryInterval = setInterval(nextArtwork, 5000);
        }

        function nextArtwork() {
            const bg = document.getElementById('galleryBg');
            const indicators = document.querySelectorAll('.indicator');
            
            // 淡出
            bg.classList.add('fade');
            
            setTimeout(() => {
                currentArtwork = (currentArtwork + 1) % artworks.length;
                bg.style.backgroundImage = `url(${artworks[currentArtwork].url})`;
                updateArtworkInfo(currentArtwork);
                
                // 更新指示器
                indicators.forEach((dot, i) => {
                    dot.classList.toggle('active', i === currentArtwork);
                });
                
                // 淡入
                bg.classList.remove('fade');
            }, 1000);
        }

        function updateArtworkInfo(index) {
            document.getElementById('artworkTitle').textContent = artworks[index].title;
            document.getElementById('artworkArtist').textContent = artworks[index].artist;
        }

        // 地图数据
        const places = [
            { name: "越秀公园东北角", lat: 23.1408, lng: 113.2644, quiet: 4 },
            { name: "天河公园西门小湖", lat: 23.1286, lng: 113.3617, quiet: 4 },
            { name: "海珠湖公园西侧栈道", lat: 23.0703, lng: 113.3144, quiet: 5 },
            { name: "珠江公园东区", lat: 23.1250, lng: 113.3333, quiet: 4 },
            { name: "东山口新河浦老别墅区", lat: 23.1208, lng: 113.3000, quiet: 5 },
            { name: "华侨新村老别墅区", lat: 23.1333, lng: 113.2833, quiet: 5 },
            { name: "广州图书馆8-9楼", lat: 23.1208, lng: 113.3250, quiet: 5 },
            { name: "红专厂旧址", lat: 23.1167, lng: 113.3667, quiet: 5 },
        ];

        let userLocation = null;

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getWalkTime(distance) {
            return Math.round(distance / 5 * 60);
        }

        function enterMap() {
            clearInterval(galleryInterval);
            document.getElementById('home').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('mapPage').classList.add('active');
                initMap();
            }, 400);
        }

        function backHome() {
            document.getElementById('mapPage').classList.remove('active');
            document.getElementById('home').classList.remove('fade-out');
            document.getElementById('placeCard').classList.remove('show');
            galleryInterval = setInterval(nextArtwork, 5000);
        }

        function initMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        renderMap();
                    },
                    err => {
                        userLocation = { lat: 23.1291, lng: 113.2644 };
                        renderMap();
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                userLocation = { lat: 23.1291, lng: 113.2644 };
                renderMap();
            }
        }

        function renderMap() {
            const grid = document.getElementById('pixelMap');
            const nearby = places.map(p => {
                const dist = getDistance(userLocation.lat, userLocation.lng, p.lat, p.lng);
                return { ...p, dist, walkTime: getWalkTime(dist) };
            }).filter(p => p.walkTime <= 10).sort((a, b) => a.walkTime - b.walkTime);
            
            grid.innerHTML = '';
            
            // 20x20 = 400个像素格子（Game Boy风格）
            for (let i = 0; i < 400; i++) {
                const cell = document.createElement('div');
                cell.className = 'pixel-cell';
                
                const row = Math.floor(i / 20);
                const col = i % 20;
                
                // 计算这个格子与各个地点的距离
                let minDist = Infinity;
                let nearestQuiet = 1;
                
                nearby.forEach(p => {
                    const pRow = 10 + Math.floor((p.lat - userLocation.lat) * 400);
                    const pCol = 10 + Math.floor((p.lng - userLocation.lng) * 400);
                    const d = Math.abs(row - pRow) + Math.abs(col - pCol);
                    if (d < minDist) {
                        minDist = d;
                        nearestQuiet = p.quiet;
                    }
                });
                
                // 根据距离衰减
                let quietLevel = nearestQuiet;
                if (minDist > 2) quietLevel = Math.max(1, quietLevel - 1);
                if (minDist > 5) quietLevel = Math.max(1, quietLevel - 1);
                
                // 中心区域（用户位置）周围是空的
                const centerRow = 10;
                const centerCol = 10;
                const distToCenter = Math.abs(row - centerRow) + Math.abs(col - centerCol);
                
                if (distToCenter <= 1) {
                    cell.classList.add('cell-empty');
                } else if (nearbyPlaces.length === 0 || minDist > 8) {
                    cell.classList.add('cell-empty');
                } else {
                    cell.classList.add(`cell-quiet-${quietLevel}`);
                }
                
                grid.appendChild(cell);
            }
            
            // 用户位置标记（中心）- Game Boy风格
            const userMarker = document.createElement('div');
            userMarker.style.cssText = 'position:absolute;width:12px;height:12px;background:#9bbc0f;border:2px solid #0f380f;z-index:20;left:50%;top:50%;transform:translate(-50%,-50%);image-rendering:pixelated;box-shadow:0 0 0 2px #8bac0f;';
            grid.appendChild(userMarker);
            
            nearby.forEach(p => {
                const marker = document.createElement('div');
                marker.style.cssText = `position:absolute;transform:translate(-50%,-50%);z-index:15;cursor:pointer;`;
                const offsetY = (userLocation.lat - p.lat) * 8000;
                const offsetX = (p.lng - userLocation.lng) * 8000;
                marker.style.left = `calc(50% + ${offsetX}px)`;
                marker.style.top = `calc(50% + ${offsetY}px)`;
                // Game Boy风格颜色
                const colors = { 5: '#9bbc0f', 4: '#8bac0f' };
                marker.innerHTML = `<div style="width:10px;height:10px;background:${colors[p.quiet]};border:2px solid #0f380f;image-rendering:pixelated;"
                    ></div>
                    <div style="position:absolute;top:12px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:9px;color:#9bbc0f;background:#0f380f;padding:2px 4px;image-rendering:pixelated;"
                    >${p.walkTime}分</div>`;
                marker.onclick = () => showPlace(p);
                grid.appendChild(marker);
            });
        }

        function showPlace(p) {
            document.getElementById('placeName').textContent = p.name;
            document.getElementById('walkTime').textContent = `步行 ${p.walkTime}分钟`;
            document.getElementById('distance').textContent = `${p.dist.toFixed(1)}km`;
            document.getElementById('placeCard').classList.add('show');
            
            document.getElementById('navBtn').onclick = () => {
                const name = encodeURIComponent(p.name);
                window.location.href = `https://uri.amap.com/navigation?to=${p.lng},${p.lat},${name}&mode=walk&coordinate=gaode`;
            };
        }

        // 初始化
        initGallery();
    </script>
</body>
</html>
