<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我想静静</title>
    <script src="https://webapi.amap.com/maps?v=1.4.15&key=f987015a56c3e1f3e64d8364fa9844c4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; overflow: hidden; }
        .home { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: #000; }
        .gallery-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; }
        .btn-quiet { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; border-radius: 50%; background: transparent; border: 1px solid rgba(255,255,255,0.4); color: white; font-size: 22px; letter-spacing: 8px; cursor: pointer; }
        .map-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .map-page.active { display: block; }
        #gaodeMap { width: 100%; height: 100%; }
        .back-btn { position: absolute; top: 50px; left: 16px; z-index: 100; width: 40px; height: 40px; background: #fff; border: none; border-radius: 50%; font-size: 18px; }
    </style>
</head>
<body>
    <div class="home" id="home">
        <div class="gallery-bg" id="galleryBg"></div>
        <button class="btn-quiet" onclick="enterMap()">我想<br>静静</button>
    </div>

    <div class="map-page" id="mapPage">
        <button class="back-btn" onclick="backHome()">←</button>
        <div id="gaodeMap"></div>
    </div>

    <script>
        var artworks = [
            { type: "text", text: "我想\n一个人\n静静" },
            { type: "text", text: "此刻\n世界与我\n无关" },
            { type: "text", text: "别吵\n让我\n待会儿" },
            { type: "text", text: "安静\n是一种\n奢侈" },
            { type: "text", text: "独处\n不是\n孤独" },
            { type: "text", text: "深夜\n适合\n发呆" },
            { type: "text", text: "耳机\n是我的\n保护罩" },
            { type: "text", text: "角落\n最\n安全" },
            { type: "text", text: "沉默\n是最好的\n回答" },
            { type: "text", text: "消失\n一会儿\n就好" },
            { type: "img", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Nighthawks_by_Edward_Hopper_1942.jpg/1200px-Nighthawks_by_Edward_Hopper_1942.jpg" },
            { type: "img", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Morning_Sun_by_Edward_Hopper.jpg/800px-Morning_Sun_by_Edward_Hopper.jpg" },
            { type: "img", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/1200px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg" },
            { type: "img", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Munch_The_Scream.jpg/800px-Munch_The_Scream.jpg" },
            { type: "img", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg/800px-The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg" },
            { type: "img", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/The_Great_Wave_off_Kanagawa.jpg/1200px-The_Great_Wave_off_Kanagawa.jpg" },
            { type: "img", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Vermeer_View_of_Delft.jpg/1200px-Vermeer_View_of_Delft.jpg" },
            { type: "img", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Vincent_van_Gogh_-_Almond_blossom_-_Google_Art_Project.jpg/1200px-Vincent_van_Gogh_-_Almond_blossom_-_Google_Art_Project.jpg" },
            { type: "img", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/The_Sleeping_Gypsy_by_Henri_Rousseau.jpg/1200px-The_Sleeping_Gypsy_by_Henri_Rousseau.jpg" },
            { type: "img", url: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Caspar_David_Friedrich_-_Wanderer_above_the_Sea_of_Fog_-_Google_Art_Project.jpg/800px-Caspar_David_Friedrich_-_Wanderer_above_the_Sea_of_Fog_-_Google_Art_Project.jpg" }
        ];

        var current = 0, timer, map;
        var bg = document.getElementById('galleryBg');

        function show(i) {
            var item = artworks[i];
            if (item.type === 'text') {
                bg.style.background = '#0a0a0a';
                bg.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:white;font-size:36px;text-align:center;white-space:pre;line-height:1.5;">' + item.text + '</div>';
            } else {
                bg.innerHTML = '';
                bg.style.background = 'url(' + item.url + ') center/cover';
            }
        }

        function next() {
            current = (current + 1) % artworks.length;
            show(current);
        }

        function initGallery() {
            show(0);
            timer = setInterval(next, 3000);
        }

        function enterMap() {
            clearInterval(timer);
            document.getElementById('home').style.display = 'none';
            document.getElementById('mapPage').classList.add('active');
            initMap();
        }

        function backHome() {
            document.getElementById('mapPage').classList.remove('active');
            document.getElementById('home').style.display = 'block';
            timer = setInterval(next, 3000);
        }

        function initMap() {
            if (typeof AMap === 'undefined') {
                document.getElementById('gaodeMap').innerHTML = '<div style="padding:100px;text-align:center;">地图加载失败</div>';
                return;
            }
            
            var center = [113.2644, 23.1291];
            map = new AMap.Map('gaodeMap', { zoom: 15, center: center });
            
            new AMap.Marker({ position: center, map: map, title: '我的位置' });
            
            var places = [
                { name: "街角公园", pos: [center[0] + 0.003, center[1] + 0.002] },
                { name: "小巷咖啡", pos: [center[0] - 0.002, center[1] + 0.003] },
                { name: "河边长椅", pos: [center[0] + 0.001, center[1] - 0.003] },
                { name: "老书店", pos: [center[0] - 0.003, center[1] - 0.001] }
            ];
            
            for (var i = 0; i < places.length; i++) {
                var m = new AMap.Marker({
                    position: places[i].pos,
                    map: map,
                    title: places[i].name,
                    label: { content: places[i].name, offset: new AMap.Pixel(0, -25) }
                });
            }
        }

        initGallery();
    </script>
</body>
</html>
