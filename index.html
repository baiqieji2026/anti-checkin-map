<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我想静静</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: #0d1117; 
            color: #fff;
            overflow: hidden;
        }
        
        /* 首页 */
        .home {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
        }
        
        .home-title {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 60px;
            letter-spacing: 2px;
        }
        
        .btn-quiet {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: #1e3a5f;
            border: 2px solid #2d5a87;
            color: #7dd3fc;
            font-size: 18px;
            letter-spacing: 4px;
            cursor: pointer;
            animation: breathe 4s ease-in-out infinite;
            transition: all 0.3s;
        }
        
        .btn-quiet:active {
            transform: scale(0.95);
            background: #2d5a87;
        }
        
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 20px rgba(125, 211, 252, 0.2); }
            50% { box-shadow: 0 0 40px rgba(125, 211, 252, 0.4); }
        }
        
        .home-hint {
            position: absolute;
            bottom: 60px;
            font-size: 12px;
            color: #4b5563;
        }
        
        /* 地图页 */
        .map-page {
            display: none;
            height: 100vh;
            position: relative;
        }
        
        .map-page.active {
            display: block;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
        
        /* 马赛克色块层 */
        .mosaic-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .mosaic-block {
            position: absolute;
            border-radius: 4px;
            opacity: 0.7;
        }
        
        .mosaic-blue { background: #1e40af; }
        .mosaic-green { background: #059669; }
        .mosaic-yellow { background: #d97706; }
        .mosaic-red { background: #dc2626; }
        
        /* 地点卡片 */
        .place-card {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(13, 17, 23, 0.95);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            z-index: 20;
            backdrop-filter: blur(10px);
        }
        
        .place-name {
            font-size: 18px;
            font-weight: 600;
            color: #7dd3fc;
        }
        
        .place-meta {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            font-size: 13px;
            color: #9ca3af;
        }
        
        .place-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .btn-walk {
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            background: #1e40af;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-walk:active {
            background: #1e3a8a;
        }
        
        .back-btn {
            position: absolute;
            top: 50px;
            left: 20px;
            z-index: 30;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(13, 17, 23, 0.9);
            border: 1px solid #30363d;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }
        
        .legend {
            position: absolute;
            top: 50px;
            right: 20px;
            z-index: 30;
            background: rgba(13, 17, 23, 0.9);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            font-size: 11px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <!-- 首页 -->
    <div class="home" id="home">
        <div class="home-title">找人少、安静、可独处的地方</div>
        <button class="btn-quiet" onclick="enterMap()">我想静静</button>
        <div class="home-hint">只推荐步行10分钟内可达的角落</div>
    </div>

    <!-- 地图页 -->
    <div class="map-page" id="mapPage">
        <button class="back-btn" onclick="backHome()">←</button>
        <div id="map"></div>
        <div class="mosaic-layer" id="mosaicLayer"></div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#1e40af"></div><span>人少安静</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#059669"></div><span>较为安静</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div><span>中等热闹</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div><span>建议避开</span></div>
        </div>
        <div class="place-card" id="placeCard" style="display:none">
            <div class="place-name" id="placeName"></div>
            <div class="place-meta">
                <span>🚶 <span id="walkTime"></span>分钟</span>
                <span>📍 <span id="distance"></span>km</span>
                <span>🔵 安静指数 <span id="quietLevel"></span></span>
            </div>
            <button class="btn-walk" id="walkBtn">步行前往</button>
        </div>
    </div>

    <script src="https://webapi.amap.com/maps?v=2.0&key=YOUR_AMAP_KEY"></script>
    <script>
        const places = [
            { name: "越秀公园东北角", lat: 23.1408, lng: 113.2644, quiet: 4, walkTime: 8 },
            { name: "天河公园西门小湖", lat: 23.1286, lng: 113.3617, quiet: 4, walkTime: 12 },
            { name: "海珠湖公园西侧栈道", lat: 23.0703, lng: 113.3144, quiet: 5, walkTime: 15 },
            { name: "白云山摩星岭后山", lat: 23.1833, lng: 113.3000, quiet: 4, walkTime: 25 },
            { name: "珠江公园东区", lat: 23.1250, lng: 113.3333, quiet: 4, walkTime: 10 },
            { name: "荔湾湖公园老西关", lat: 23.1167, lng: 113.2500, quiet: 4, walkTime: 18 },
            { name: "东山口新河浦老别墅区", lat: 23.1208, lng: 113.3000, quiet: 5, walkTime: 9 },
            { name: "西关大屋群", lat: 23.1167, lng: 113.2333, quiet: 4, walkTime: 20 },
            { name: "沙面岛北侧", lat: 23.1083, lng: 113.2500, quiet: 4, walkTime: 22 },
            { name: "华侨新村老别墅区", lat: 23.1333, lng: 113.2833, quiet: 5, walkTime: 7 },
            { name: "江南西青凤大街", lat: 23.1000, lng: 113.2667, quiet: 3, walkTime: 14 },
            { name: "珠江前航道员村段", lat: 23.1167, lng: 113.3500, quiet: 4, walkTime: 11 },
            { name: "琶洲大桥下", lat: 23.1000, lng: 113.3667, quiet: 3, walkTime: 16 },
            { name: "芳村花地河沿岸", lat: 23.0833, lng: 113.2333, quiet: 4, walkTime: 28 },
            { name: "洛溪岛江边", lat: 23.0333, lng: 113.3167, quiet: 4, walkTime: 35 },
            { name: "广州图书馆8-9楼", lat: 23.1208, lng: 113.3250, quiet: 5, walkTime: 6 },
            { name: "广东省博物馆", lat: 23.1167, lng: 113.3250, quiet: 4, walkTime: 8 },
            { name: "方所书店", lat: 23.1333, lng: 113.3333, quiet: 3, walkTime: 13 },
            { name: "红专厂旧址", lat: 23.1167, lng: 113.3667, quiet: 5, walkTime: 19 },
            { name: "珠江啤酒厂旧址", lat: 23.1000, lng: 113.3500, quiet: 4, walkTime: 17 }
        ];

        let map = null;
        let userLocation = null;

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getWalkTime(distance) {
            return Math.round(distance / 5 * 60); // 步行速度约5km/h
        }

        function getQuietColor(level) {
            if (level >= 5) return 'blue';
            if (level >= 4) return 'green';
            if (level >= 3) return 'yellow';
            return 'red';
        }

        function enterMap() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('mapPage').classList.add('active');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => initMap(pos.coords.latitude, pos.coords.longitude),
                    err => initMap(23.1291, 113.2644)
                );
            } else {
                initMap(23.1291, 113.2644);
            }
        }

        function backHome() {
            document.getElementById('home').style.display = 'flex';
            document.getElementById('mapPage').classList.remove('active');
        }

        function initMap(lat, lng) {
            userLocation = { lat, lng };
            
            // 过滤步行10分钟内的地点
            const nearby = places.map(p => {
                const dist = getDistance(lat, lng, p.lat, p.lng);
                const walkTime = getWalkTime(dist);
                return { ...p, dist, walkTime };
            }).filter(p => p.walkTime <= 10).sort((a, b) => a.walkTime - b.walkTime);

            // 初始化地图
            map = new AMap.Map('map', {
                center: [lng, lat],
                zoom: 15,
                mapStyle: 'amap://styles/dark'
            });

            // 添加用户位置标记
            new AMap.Marker({
                position: [lng, lat],
                map: map,
                icon: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png'
            });

            // 添加马赛克色块
            const mosaicLayer = document.getElementById('mosaicLayer');
            nearby.forEach((p, i) => {
                const pixel = map.lngLatToContainer([p.lng, p.lat]);
                const block = document.createElement('div');
                block.className = `mosaic-block mosaic-${getQuietColor(p.quiet)}`;
                block.style.left = pixel.getX() - 20 + 'px';
                block.style.top = pixel.getY() - 20 + 'px';
                block.style.width = '40px';
                block.style.height = '40px';
                block.onclick = () => showPlace(p);
                mosaicLayer.appendChild(block);

                // 添加地图标记
                const marker = new AMap.Marker({
                    position: [p.lng, p.lat],
                    map: map,
                    content: `<div style="background:#1e40af;color:#fff;padding:4px 8px;border-radius:4px;font-size:12px;">
                        ${p.walkTime}分钟
                    </div>`
                });
                marker.on('click', () => showPlace(p));
            });
        }

        function showPlace(p) {
            document.getElementById('placeName').textContent = p.name;
            document.getElementById('walkTime').textContent = p.walkTime;
            document.getElementById('distance').textContent = p.dist.toFixed(1);
            document.getElementById('quietLevel').textContent = '★'.repeat(p.quiet);
            document.getElementById('placeCard').style.display = 'block';
            
            document.getElementById('walkBtn').onclick = () => {
                window.location.href = `https://uri.amap.com/navigation?to=${p.lng},${p.lat},${p.name}&mode=walk&coordinate=gaode`;
            };
        }
    </script>
</body>
</html>
