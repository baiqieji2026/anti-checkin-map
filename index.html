<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我想静静</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden;
            background: #0a0e17;
        }
        
        /* ===== 首页 - 霍珀式静谧氛围 ===== */
        .home {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 深夜窗边的光线感 */
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(30, 58, 95, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(45, 90, 135, 0.1) 0%, transparent 40%),
                linear-gradient(180deg, #0a0e17 0%, #0d1320 50%, #0a0e17 100%);
            z-index: 100;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        .home.fade-out {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }
        
        /* 微弱的光线效果 - 像深夜窗边的月光 */
        .home::before {
            content: '';
            position: absolute;
            top: 10%;
            right: 15%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(125, 211, 252, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: moon-glow 6s ease-in-out infinite;
        }
        
        @keyframes moon-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        
        .home-subtitle {
            font-size: 13px;
            color: #4a5568;
            margin-bottom: 80px;
            letter-spacing: 3px;
            font-weight: 300;
        }
        
        /* 主按钮 - 像深夜的一盏灯 */
        .btn-quiet {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid rgba(125, 211, 252, 0.3);
            color: rgba(125, 211, 252, 0.9);
            font-size: 16px;
            letter-spacing: 6px;
            cursor: pointer;
            animation: lamp-breathe 5s ease-in-out infinite;
            transition: all 0.4s ease;
            backdrop-filter: blur(2px);
        }
        
        .btn-quiet::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(30, 58, 95, 0.4) 0%, transparent 70%);
            z-index: -1;
        }
        
        @keyframes lamp-breathe {
            0%, 100% { 
                box-shadow: 
                    0 0 30px rgba(125, 211, 252, 0.1),
                    inset 0 0 20px rgba(125, 211, 252, 0.05);
                border-color: rgba(125, 211, 252, 0.25);
            }
            50% { 
                box-shadow: 
                    0 0 50px rgba(125, 211, 252, 0.2),
                    inset 0 0 30px rgba(125, 211, 252, 0.1);
                border-color: rgba(125, 211, 252, 0.4);
            }
        }
        
        .btn-quiet:active {
            transform: scale(0.95);
            background: rgba(30, 58, 95, 0.3);
        }
        
        .home-hint {
            position: absolute;
            bottom: 80px;
            font-size: 11px;
            color: #3d4852;
            letter-spacing: 1px;
        }
        
        /* ===== 地图页 ===== */
        .map-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 1s ease, transform 1s ease;
            background: #0a0e17;
        }
        
        .map-page.active {
            opacity: 1;
            transform: scale(1);
        }
        
        #map-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        /* 马赛克网格层 */
        .mosaic-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(12, 1fr);
            gap: 2px;
            padding: 2px;
            z-index: 10;
            pointer-events: none;
        }
        
        .mosaic-cell {
            border-radius: 2px;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }
        
        /* 色块含义：蓝色=人最少（推荐），绿色=较少，黄色=中等，红色=热闹（避开） */
        .cell-quiet-5 { background: #1e3a8a; } /* 深蓝 - 人最少 */
        .cell-quiet-4 { background: #3b82f6; } /* 蓝色 - 安静 */
        .cell-quiet-3 { background: #10b981; } /* 绿色 - 中等 */
        .cell-quiet-2 { background: #f59e0b; } /* 黄色 - 较热闹 */
        .cell-quiet-1 { background: #ef4444; } /* 红色 - 热闹 */
        
        /* 用户位置标记 */
        .user-marker {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fff;
            border: 3px solid #3b82f6;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
        
        /* 地点标记 */
        .place-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 15;
            cursor: pointer;
            pointer-events: auto;
        }
        
        .place-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .place-label {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 11px;
            color: rgba(255,255,255,0.9);
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }
        
        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 50px;
            left: 20px;
            z-index: 30;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(10, 14, 23, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        
        /* 图例 */
        .legend {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            z-index: 30;
            background: rgba(10, 14, 23, 0.9);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(10px);
        }
        
        .legend-title {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        
        .legend-items {
            display: flex;
            justify-content: space-between;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.7);
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }
        
        /* 地点卡片 */
        .place-card {
            position: absolute;
            bottom: 140px;
            left: 20px;
            right: 20px;
            background: rgba(10, 14, 23, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            z-index: 25;
            backdrop-filter: blur(20px);
            display: none;
        }
        
        .place-card.show {
            display: block;
            animation: slide-up 0.3s ease;
        }
        
        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .place-name {
            font-size: 18px;
            font-weight: 500;
            color: rgba(255,255,255,0.95);
            margin-bottom: 8px;
        }
        
        .place-info {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 16px;
        }
        
        .btn-navigate {
            width: 100%;
            padding: 14px;
            background: #1e3a8a;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn-navigate:active {
            background: #1e40af;
        }
        
        /* 加载提示 */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <!-- 首页 -->
    <div class="home" id="home">
        <div class="home-subtitle">找人少、安静、可独处的地方</div>
        <button class="btn-quiet" onclick="enterMap()">我想静静</button>
        <div class="home-hint">只推荐步行10分钟内可达的角落</div>
    </div>

    <!-- 地图页 -->
    <div class="map-page" id="mapPage">
        <button class="back-btn" onclick="backHome()">←</button>
        <div id="map-container">
            <div class="loading" id="loading">正在寻找安静的角落...</div>
            <div class="mosaic-grid" id="mosaicGrid"></div>
        </div>
        
        <div class="legend">
            <div class="legend-title">安静指数</div>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="legend-dot" style="background:#1e3a8a"></div>
                    <span>极少</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#3b82f6"></div>
                    <span>安静</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#10b981"></div>
                    <span>中等</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#f59e0b"></div>
                    <span>热闹</span>
                </div>
            </div>
        </div>
        
        <div class="place-card" id="placeCard">
            <div class="place-name" id="placeName"></div>
            <div class="place-info">
                <span id="walkTime"></span>
                <span id="distance"></span>
            </div>
            <button class="btn-navigate" id="navBtn">步行前往</button>
        </div>
    </div>

    <script>
        // 广州安静地点数据
        const places = [
            { name: "越秀公园东北角", lat: 23.1408, lng: 113.2644, quiet: 4 },
            { name: "天河公园西门小湖", lat: 23.1286, lng: 113.3617, quiet: 4 },
            { name: "海珠湖公园西侧栈道", lat: 23.0703, lng: 113.3144, quiet: 5 },
            { name: "珠江公园东区", lat: 23.1250, lng: 113.3333, quiet: 4 },
            { name: "东山口新河浦老别墅区", lat: 23.1208, lng: 113.3000, quiet: 5 },
            { name: "华侨新村老别墅区", lat: 23.1333, lng: 113.2833, quiet: 5 },
            { name: "广州图书馆8-9楼", lat: 23.1208, lng: 113.3250, quiet: 5 },
            { name: "红专厂旧址", lat: 23.1167, lng: 113.3667, quiet: 5 },
        ];

        let userLocation = null;
        let nearbyPlaces = [];

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getWalkTime(distance) {
            return Math.round(distance / 5 * 60);
        }

        function enterMap() {
            // 首页淡出
            document.getElementById('home').classList.add('fade-out');
            
            // 地图页显示
            setTimeout(() => {
                document.getElementById('mapPage').classList.add('active');
                initMap();
            }, 300);
        }

        function backHome() {
            document.getElementById('mapPage').classList.remove('active');
            document.getElementById('home').classList.remove('fade-out');
            document.getElementById('placeCard').classList.remove('show');
        }

        function initMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        renderMap();
                    },
                    err => {
                        // 默认位置：广州天河
                        userLocation = { lat: 23.1291, lng: 113.2644 };
                        renderMap();
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                userLocation = { lat: 23.1291, lng: 113.2644 };
                renderMap();
            }
        }

        function renderMap() {
            document.getElementById('loading').style.display = 'none';
            
            const container = document.getElementById('map-container');
            const grid = document.getElementById('mosaicGrid');
            
            // 计算步行10分钟内的地点
            nearbyPlaces = places.map(p => {
                const dist = getDistance(userLocation.lat, userLocation.lng, p.lat, p.lng);
                const walkTime = getWalkTime(dist);
                return { ...p, dist, walkTime };
            }).filter(p => p.walkTime <= 10).sort((a, b) => a.walkTime - b.walkTime);
            
            // 清空网格
            grid.innerHTML = '';
            
            // 生成马赛克网格（8x12 = 96个格子）
            for (let i = 0; i < 96; i++) {
                const cell = document.createElement('div');
                cell.className = 'mosaic-cell';
                
                // 根据位置分配安静指数（模拟数据）
                // 实际应用中应该根据真实人流数据
                const row = Math.floor(i / 8);
                const col = i % 8;
                
                // 找到最近的地点，影响周围格子的颜色
                let nearestDist = Infinity;
                let nearestQuiet = 3;
                
                nearbyPlaces.forEach(p => {
                    // 简化的距离计算（基于网格位置）
                    const pRow = Math.floor((p.lat - 23.0) / 0.02);
                    const pCol = Math.floor((p.lng - 113.2) / 0.02);
                    const d = Math.abs(row - pRow) + Math.abs(col - pCol);
                    if (d < nearestDist) {
                        nearestDist = d;
                        nearestQuiet = p.quiet;
                    }
                });
                
                // 根据距离衰减安静指数
                let quietLevel = nearestQuiet;
                if (nearestDist > 3) quietLevel = Math.max(1, quietLevel - 1);
                if (nearestDist > 6) quietLevel = Math.max(1, quietLevel - 1);
                
                cell.classList.add(`cell-quiet-${quietLevel}`);
                grid.appendChild(cell);
            }
            
            // 添加用户位置标记（中心位置）
            const userMarker = document.createElement('div');
            userMarker.className = 'user-marker';
            userMarker.style.left = '50%';
            userMarker.style.top = '45%';
            container.appendChild(userMarker);
            
            // 添加地点标记
            nearbyPlaces.forEach((p, i) => {
                const marker = document.createElement('div');
                marker.className = 'place-marker';
                
                // 简化的位置计算（实际应该用地图投影）
                const offsetX = (p.lng - userLocation.lng) * 5000;
                const offsetY = (userLocation.lat - p.lat) * 5000;
                
                marker.style.left = `calc(50% + ${offsetX}px)`;
                marker.style.top = `calc(45% + ${offsetY}px)`;
                
                marker.innerHTML = `
                    <div class="place-dot" style="background:${getQuietColor(p.quiet)}"></div>
                    <div class="place-label">${p.walkTime}分钟</div>
                `;
                
                marker.onclick = () => showPlace(p);
                container.appendChild(marker);
            });
        }

        function getQuietColor(level) {
            const colors = { 5: '#1e3a8a', 4: '#3b82f6', 3: '#10b981', 2: '#f59e0b', 1: '#ef4444' };
            return colors[level] || '#6b7280';
        }

        function showPlace(p) {
            document.getElementById('placeName').textContent = p.name;
            document.getElementById('walkTime').textContent = `🚶 ${p.walkTime}分钟`;
            document.getElementById('distance').textContent = `📍 ${p.dist.toFixed(1)}km`;
            document.getElementById('placeCard').classList.add('show');
            
            document.getElementById('navBtn').onclick = () => {
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                const name = encodeURIComponent(p.name);
                
                if (isIOS) {
                    window.location.href = `iosamap://path?dlat=${p.lat}&dlon=${p.lng}&dname=${name}&dev=0&m=0&t=2`;
                } else {
                    window.location.href = `amapuri://route/plan/?dlat=${p.lat}&dlon=${p.lng}&dname=${name}&dev=0&t=2`;
                }
                
                // 兜底
                setTimeout(() => {
                    window.location.href = `https://uri.amap.com/navigation?to=${p.lng},${p.lat},${name}&mode=walk&coordinate=gaode`;
                }, 500);
            };
        }
    </script>
</body>
</html>
