<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我想静静</title>
    <script src="https://webapi.amap.com/maps?v=1.4.15&key=f987015a56c3e1f3e64d8364fa9844c4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        /* 首页 */
        #home { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; }
        #gallery { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #gallery img { width: 100%; height: 100%; object-fit: cover; }
        #gallery .text { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 32px; text-align: center; white-space: pre; line-height: 1.8; }
        
        .btn-quiet { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.5); color: #fff; font-size: 22px; letter-spacing: 8px; line-height: 1.5; z-index: 100; pointer-events: auto; cursor: pointer; }
        
        /* 地图页 */
        #mapPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #mapPage.show { display: block; }
        #gaodeMap { width: 100%; height: 100%; }
        .back-btn { position: absolute; top: 50px; left: 16px; z-index: 100; width: 44px; height: 44px; border-radius: 50%; border: none; background: #fff; font-size: 20px; }
        
        .card { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; padding: 20px; z-index: 100; }
        .places { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 10px; }
        .place { padding: 10px 16px; background: #f0f0f0; border-radius: 20px; font-size: 14px; white-space: nowrap; }
        .place.active { background: #667eea; color: #fff; }
        .info { padding: 15px; background: #f5f5f5; border-radius: 10px; margin-bottom: 10px; display: none; }
        .info.show { display: block; }
        .nav-btn { width: 100%; padding: 15px; background: #667eea; color: #fff; border: none; border-radius: 10px; font-size: 16px; }
        .nav-btn:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div id="home">
        <div id="gallery"></div>
        <button class="btn-quiet" onclick="goMap()">我想<br>静静</button>
    </div>

    <div id="mapPage">
        <button class="back-btn" onclick="goHome()">←</button>
        <div id="gaodeMap"></div>
        <div class="card">
            <div class="places" id="places"></div>
            <div class="info" id="info">
                <div id="infoText"></div>
            </div>
            <button class="nav-btn" id="navBtn" disabled onclick="goNav()">选择目的地</button>
        </div>
    </div>

    <script>
        // 20张素材
        var items = [
            {type:'text', content:'我想\n一个人\n静静'},
            {type:'text', content:'此刻\n世界与我\n无关'},
            {type:'text', content:'别吵\n让我\n待会儿'},
            {type:'text', content:'安静\n是一种\n奢侈'},
            {type:'text', content:'独处\n不是\n孤独'},
            {type:'text', content:'深夜\n适合\n发呆'},
            {type:'text', content:'耳机\n是我的\n保护罩'},
            {type:'text', content:'角落\n最\n安全'},
            {type:'text', content:'沉默\n是最好的\n回答'},
            {type:'text', content:'消失\n一会儿\n就好'},
            {type:'img', src:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Nighthawks_by_Edward_Hopper_1942.jpg/1200px-Nighthawks_by_Edward_Hopper_1942.jpg'},
            {type:'img', src:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/1200px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg'},
            {type:'img', src:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Munch_The_Scream.jpg/800px-Munch_The_Scream.jpg'},
            {type:'img', src:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg/800px-The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg'},
            {type:'img', src:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/The_Great_Wave_off_Kanagawa.jpg/1200px-The_Great_Wave_off_Kanagawa.jpg'},
            {type:'img', src:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Vermeer_View_of_Delft.jpg/1200px-Vermeer_View_of_Delft.jpg'},
            {type:'img', src:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/The_Sleeping_Gypsy_by_Henri_Rousseau.jpg/1200px-The_Sleeping_Gypsy_by_Henri_Rousseau.jpg'},
            {type:'img', src:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Caspar_David_Friedrich_-_Wanderer_above_the_Sea_of_Fog_-_Google_Art_Project.jpg/800px-Caspar_David_Friedrich_-_Wanderer_above_the_Sea_of_Fog_-_Google_Art_Project.jpg'},
            {type:'img', src:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Morning_Sun_by_Edward_Hopper.jpg/800px-Morning_Sun_by_Edward_Hopper.jpg'},
            {type:'img', src:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Vincent_van_Gogh_-_Almond_blossom_-_Google_Art_Project.jpg/1200px-Vincent_van_Gogh_-_Almond_blossom_-_Google_Art_Project.jpg'}
        ];

        var idx = 0, timer, map, userPos, dest;

        function showItem(i) {
            var g = document.getElementById('gallery');
            var it = items[i];
            g.innerHTML = '';
            if (it.type === 'text') {
                g.innerHTML = '<div class="text">' + it.content + '</div>';
            } else {
                var img = document.createElement('img');
                img.src = it.src;
                img.onerror = function() { this.style.display = 'none'; };
                g.appendChild(img);
            }
        }

        function nextItem() {
            idx = idx + 1;
            if (idx >= items.length) idx = 0;
            showItem(idx);
        }

        function startGallery() {
            showItem(0);
            timer = setInterval(nextItem, 3000);
        }

        function goMap() {
            clearInterval(timer);
            document.getElementById('home').style.display = 'none';
            document.getElementById('mapPage').className = 'show';
            loadMap();
        }

        function goHome() {
            document.getElementById('mapPage').className = '';
            document.getElementById('home').style.display = 'block';
            timer = setInterval(nextItem, 3000);
        }

        function loadMap() {
            if (typeof AMap === 'undefined') {
                document.getElementById('gaodeMap').innerHTML = '<div style="padding:100px;text-align:center">地图加载失败</div>';
                return;
            }

            // 默认位置
            userPos = [113.2644, 23.1291];

            map = new AMap.Map('gaodeMap', {
                zoom: 15,
                center: userPos
            });

            // 我的位置
            new AMap.Marker({
                position: userPos,
                map: map,
                title: '我的位置'
            });

            // 虚拟地点
            var places = [
                {name: '街角公园', pos: [userPos[0] + 0.003, userPos[1] + 0.002]},
                {name: '小巷咖啡', pos: [userPos[0] - 0.002, userPos[1] + 0.003]},
                {name: '河边长椅', pos: [userPos[0] + 0.001, userPos[1] - 0.003]},
                {name: '老书店', pos: [userPos[0] - 0.003, userPos[1] - 0.001]}
            ];

            var pl = document.getElementById('places');

            places.forEach(function(p) {
                // 地图标记
                var m = new AMap.Marker({
                    position: p.pos,
                    map: map,
                    title: p.name
                });

                // 标签
                var t = document.createElement('div');
                t.className = 'place';
                t.textContent = p.name;
                t.onclick = function() {
                    document.querySelectorAll('.place').forEach(function(el) { el.className = 'place'; });
                    t.className = 'place active';
                    selectPlace(p);
                };
                pl.appendChild(t);

                // 标记点击
                m.on('click', function() {
                    document.querySelectorAll('.place').forEach(function(el) { el.className = 'place'; });
                    t.className = 'place active';
                    selectPlace(p);
                });
            });
        }

        function selectPlace(p) {
            dest = p;
            document.getElementById('info').className = 'info show';
            document.getElementById('infoText').textContent = '目的地: ' + p.name;
            document.getElementById('navBtn').disabled = false;
            document.getElementById('navBtn').textContent = '开始导航到 ' + p.name;

            // 画路线
            AMap.plugin(['AMap.Walking'], function() {
                var walking = new AMap.Walking({ map: map });
                walking.search(userPos, p.pos);
            });
        }

        function goNav() {
            if (dest) {
                window.location.href = 'https://uri.amap.com/navigation?to=' + dest.pos[0] + ',' + dest.pos[1] + ',' + encodeURIComponent(dest.name) + '&mode=walk&coordinate=gaode';
            }
        }

        startGallery();
    </script>
</body>
</html>
